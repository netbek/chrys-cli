default_language_version:
  node: 24.15.0

default_stages: [pre-commit]

fail_fast: true

repos:
  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: nixfmt
        language: system
        files: \.nix$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        alias: prettier-js
        name: prettier (js)
        args: [--parser, babel, --write]
        files: ^(src)/.*\.(js|jsx|cjs|mjs)$
